          if-no-files-found: warn        with:

          name: immunity-core-windows-x86_64

  # ============================          path: Antivirus-Immunity\target\release\antivirus-immunity-core.exe

  # Security audit          if-no-files-found: warn

  # ============================

  audit:  # ============================

    name: Security Audit  # Linux cross-compile: aarch64 (ARM64)

    runs-on: ubuntu-latest  # For AWS Graviton / ARM cloud instances

    continue-on-error: true  # ============================

  linux-arm64:

    steps:    name: Linux ARM64 (cross-compile)

      - name: Checkout    runs-on: ubuntu-latest

        uses: actions/checkout@v4

    steps:

      - name: Install Rust      - name: Checkout

        uses: dtolnay/rust-toolchain@stable        uses: actions/checkout@v4



      - name: Install cargo-audit      - name: Install Rust toolchain + aarch64 target

        run: cargo install cargo-audit        uses: dtolnay/rust-toolchain@stable

        with:

      - name: Audit          targets: aarch64-unknown-linux-gnu

        working-directory: Antivirus-Immunity

        run: cargo audit      - name: Install cross-compilation tools

        continue-on-error: true        run: |

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Antivirus-Immunity/target
          key: arm64-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: |
            arm64-cargo-

      - name: Build (ebpf — ARM64 release)
        working-directory: Antivirus-Immunity
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --package antivirus-immunity-ebpf --release --target aarch64-unknown-linux-gnu 2>&1 || true
        # Cross-compilation may fail for some native deps (yara-x, nix)
        # This is a best-effort check; full ARM64 builds require a native runner

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: immunity-ebpf-linux-aarch64
          path: Antivirus-Immunity/target/aarch64-unknown-linux-gnu/release/immunity-ebpf
          if-no-files-found: ignore

  # ============================
  # Security audit
  # ============================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        working-directory: Antivirus-Immunity
        run: cargo audit 2>&1 || true
        # Advisory-only: don't fail the build for now
