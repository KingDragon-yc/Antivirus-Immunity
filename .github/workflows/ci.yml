      - name: Install Rust toolchain      - name: Install Rust toolchain

        uses: dtolnay/rust-toolchain@stable        uses: dtolnay/rust-toolchain@stable

        with:        with:

          components: clippy, rustfmt          components: clippy, rustfmt



      - name: Cache Cargo      - name: Cache Cargo registry & build

        uses: actions/cache@v4        uses: actions/cache@v4

        with:        with:

          path: |          path: |

            ~\.cargo\registry            ~\.cargo\registry

            ~\.cargo\git            ~\.cargo\git

            Antivirus-Immunity\target            Antivirus-Immunity\target

          key: windows-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}          key: windows-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}

          restore-keys: windows-          restore-keys: |

            windows-cargo-

      - name: Formatting check

        working-directory: Antivirus-Immunity      - name: Check formatting

        run: cargo fmt --all -- --check        working-directory: Antivirus-Immunity

        run: |

      - name: Clippy (common)          cargo fmt --package antivirus-immunity-common -- --check

        working-directory: Antivirus-Immunity          cargo fmt --package antivirus-immunity-core -- --check

