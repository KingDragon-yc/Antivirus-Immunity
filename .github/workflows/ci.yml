name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux (common + ebpf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Antivirus-Immunity/target
          key: linux-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy ebpf
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-ebpf -- -A dead_code -D warnings

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build ebpf
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-ebpf --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test ebpf
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-ebpf

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-ebpf-linux-x86_64
          path: Antivirus-Immunity/target/release/immunity-ebpf
          if-no-files-found: warn

  windows:
    name: Windows (common + core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # OpenSSL headers + libs are needed to build `yara-x`'s transitive dep
      # `authenticode-parser-sys`. Without this, `cargo build core` fails with
      # `C1083: Cannot open include file: 'openssl/x509.h'`.
      #
      # The `openssl-sys` crate reads `OPENSSL_DIR` (and optionally
      # `OPENSSL_LIB_DIR` / `OPENSSL_INCLUDE_DIR`) to locate the install. We
      # set ONLY `OPENSSL_DIR` because openssl-sys auto-discovers `include` and
      # `lib` under it — hard-coding a specific lib subdir (e.g. `lib\VC\x64\MT`)
      # is fragile across choco package versions and previously caused the step
      # to exit 1 when that exact subdir did not exist.
      - name: Install OpenSSL
        shell: powershell
        run: |
          choco install openssl --no-progress -y
          # choco's openssl package installs under one of a few well-known
          # roots depending on package version; pick whichever exists.
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL",
            "C:\OpenSSL-Win64"
          )
          $root = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $root) {
            Write-Error "OpenSSL install root not found in any of: $($candidates -join ', ')"
            Get-ChildItem "C:\Program Files" -Filter "OpenSSL*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  found: $($_.FullName)" }
            exit 1
          }
          Write-Host "Using OpenSSL at: $root"
          Get-ChildItem "$root\lib" -Recurse -Filter "libcrypto*" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "  lib: $($_.FullName)" }
          # openssl-sys derives lib/include from OPENSSL_DIR automatically.
          "OPENSSL_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            Antivirus-Immunity\target
          key: windows-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy core
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-core -- -A dead_code
        continue-on-error: true

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build core
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-core --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test core
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-core

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-core-windows-x86_64
          path: Antivirus-Immunity\target\release\antivirus-immunity-core.exe
          if-no-files-found: warn

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - name: Audit
        working-directory: Antivirus-Immunity
        run: cargo audit
        continue-on-error: true
