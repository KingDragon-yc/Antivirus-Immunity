          restore-keys: linux-        run: |

          cargo fmt --package antivirus-immunity-common -- --check

      - name: Formatting check          cargo fmt --package antivirus-immunity-ebpf -- --check

        working-directory: Antivirus-Immunity

        run: cargo fmt --all -- --check      - name: Clippy lint (common)

        working-directory: Antivirus-Immunity

      - name: Clippy (common)        run: cargo clippy --package antivirus-immunity-common -- -D warnings

        working-directory: Antivirus-Immunity

        run: cargo clippy --package antivirus-immunity-common -- -D warnings      - name: Clippy lint (ebpf)

        working-directory: Antivirus-Immunity

      - name: Clippy (ebpf — allow dead_code)        run: cargo clippy --package antivirus-immunity-ebpf -- -D warnings 2>&1 || true

        working-directory: Antivirus-Immunity        # NOTE: ebpf crate has expected dead_code warnings for infrastructure modules

