name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux (common + ebpf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Antivirus-Immunity/target
          key: linux-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy ebpf
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-ebpf -- -A dead_code -D warnings

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build ebpf
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-ebpf --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test ebpf
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-ebpf

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-ebpf-linux-x86_64
          path: Antivirus-Immunity/target/release/immunity-ebpf
          if-no-files-found: warn

  windows:
    name: Windows (common + core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Configure OpenSSL (Windows)
        shell: pwsh
        run: |
          # Install/upgrade OpenSSL dev package (provides libcrypto.lib + headers)
          choco upgrade openssl --yes --no-progress
          # Locate the installation root (must have headers)
          $opensslDir = @('C:\Program Files\OpenSSL-Win64', 'C:\Program Files\OpenSSL') |
            Where-Object { Test-Path "$_\include\openssl\ssl.h" } | Select-Object -First 1
          if (-not $opensslDir) { Write-Error "OpenSSL headers not found"; exit 1 }
          # Recursively find libcrypto.lib under the installation root
          $libFile = Get-ChildItem -Path $opensslDir -Recurse -Filter 'libcrypto.lib' `
                       -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $libFile) { Write-Error "libcrypto.lib not found under $opensslDir"; exit 1 }
          $libDir = $libFile.DirectoryName
          Write-Host "OPENSSL_DIR         = $opensslDir"
          Write-Host "OPENSSL_INCLUDE_DIR = $opensslDir\include"
          Write-Host "OPENSSL_LIB_DIR     = $libDir"
          "OPENSSL_DIR=$opensslDir"                 >> $env:GITHUB_ENV
          "OPENSSL_INCLUDE_DIR=$opensslDir\include" >> $env:GITHUB_ENV
          "OPENSSL_LIB_DIR=$libDir"                 >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            Antivirus-Immunity\target
          key: windows-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy core
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-core -- -A dead_code
        continue-on-error: true

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build core
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-core --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test core
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-core

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-core-windows-x86_64
          path: Antivirus-Immunity\target\release\antivirus-immunity-core.exe
          if-no-files-found: warn

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - name: Audit
        working-directory: Antivirus-Immunity
        run: cargo audit
        continue-on-error: true
