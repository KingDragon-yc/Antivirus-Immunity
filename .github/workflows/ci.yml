name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux (common + ebpf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Antivirus-Immunity/target
          key: linux-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy ebpf
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-ebpf -- -A dead_code -D warnings

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build ebpf
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-ebpf --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test ebpf
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-ebpf

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-ebpf-linux-x86_64
          path: Antivirus-Immunity/target/release/immunity-ebpf
          if-no-files-found: warn

  windows:
    name: Windows (common + core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # OpenSSL headers + libs are needed to build `yara-x`'s transitive dep
      # `authenticode-parser-sys`. Without this, `cargo build core` fails with
      # `C1083: Cannot open include file: 'openssl/x509.h'`. We expose the
      # install location via the OPENSSL_* env vars that the `openssl-sys`
      # crate reads.
      - name: Install OpenSSL
        shell: powershell
        run: |
          choco install openssl --no-progress -y
          $root = "C:\Program Files\OpenSSL-Win64"
          "OPENSSL_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_INCLUDE_DIR=$root\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path "$root\lib\VC\x64\MT") {
            "OPENSSL_LIB_DIR=$root\lib\VC\x64\MT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } elseif (Test-Path "$root\lib") {
            "OPENSSL_LIB_DIR=$root\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Error "Could not locate OpenSSL libraries under $root"
            exit 1
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            Antivirus-Immunity\target
          key: windows-cargo-${{ hashFiles('Antivirus-Immunity/**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Formatting
        working-directory: Antivirus-Immunity
        run: cargo fmt --all -- --check

      - name: Clippy common
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-common -- -D warnings

      - name: Clippy core
        working-directory: Antivirus-Immunity
        run: cargo clippy --package antivirus-immunity-core -- -A dead_code
        continue-on-error: true

      - name: Build common
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-common

      - name: Build core
        working-directory: Antivirus-Immunity
        run: cargo build --package antivirus-immunity-core --release

      - name: Test common
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-common

      - name: Test core
        working-directory: Antivirus-Immunity
        run: cargo test --package antivirus-immunity-core

      - uses: actions/upload-artifact@v4
        with:
          name: immunity-core-windows-x86_64
          path: Antivirus-Immunity\target\release\antivirus-immunity-core.exe
          if-no-files-found: warn

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - name: Audit
        working-directory: Antivirus-Immunity
        run: cargo audit
        continue-on-error: true
