      - name: Install Rust toolchain      - name: Cache Cargo registry & build

        uses: dtolnay/rust-toolchain@stable        uses: actions/cache@v4

        with:        with:

          components: clippy, rustfmt          path: |

            ~/.cargo/registry

      - name: Cache Cargo            ~/.cargo/git

        uses: actions/cache@v4            Antivirus-Immunity/target

