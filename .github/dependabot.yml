# Dependabot — 自动依赖更新
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Rust (Cargo) dependencies
  - package-ecosystem: "cargo"
    directory: "/Antivirus-Immunity"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    # 仅允许 patch + minor 升级，阻止 major（breaking changes）
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    # 锁定 Actions 大版本
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
